version: "3.8"
services:
    web:
        build:
            context: .
            dockerfile: Dockerfile.dev
        ports:
            - "5173:5173" # Vite dev server
            - "24678:24678" # HMR WebSocket
        volumes:
            - .:/app
            - /app/node_modules
        environment:
            - HOST=0.0.0.0
        command: npm run dev
